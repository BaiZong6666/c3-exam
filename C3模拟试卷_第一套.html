const SCORE_MAP = {single:1, multiple:2, judge:1};
let userAnswers = {};
let submitted = false;
let timerSeconds = 90 * 60;
let timerInterval = null;

function init() {
    document.getElementById('totalNum').textContent = QUESTIONS.length;
    renderQuestions();
    renderNav();
    startTimer();
}

function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    let html = '';
    let lastType = '';
    const typeNames = {single:'一、单选题（每题1分，共60分）', multiple:'二、多选题（每题2分，共10题）', judge:'三、判断题（每题1分，共20题）'};
    const typeStartNums = {single:1, multiple:1, judge:1};
    
    QUESTIONS.forEach((q, idx) => {
        if (q.type !== lastType) {
            html += '<div class="section-title">' + typeNames[q.type] + '</div>';
            lastType = q.type;
        }
        html += '<div class="question-card" id="q' + idx + '">';
        html += '<div class="q-text"><span class="q-num">' + q.num + '.</span>' + escapeHtml(q.question) + '</div>';
        
        if (q.type === 'multiple') {
            html += '<div style="font-size:12px;color:#999;margin-bottom:8px;">（多选题，少选、错选不得分）</div>';
        }
        
        const optKeys = q.type === 'judge' ? ['A','B'] : ['A','B','C','D'];
        optKeys.forEach(key => {
            const val = q.type === 'judge' ? (key==='A'?'正确':'错误') : (q.options[key] || '');
            if (!val && q.type !== 'judge') return;
            html += '<div class="option" data-idx="'+idx+'" data-key="'+key+'" onclick="selectOption('+idx+',\''+key+'\')">';
            html += '<span class="opt-letter">'+key+'</span>' + escapeHtml(val);
            html += '</div>';
        });
        
        html += '<div class="answer-info" id="ans'+idx+'">正确答案：' + q.answer + '</div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

function renderNav() {
    const grid = document.getElementById('navGrid');
    let html = '';
    QUESTIONS.forEach((q, idx) => {
        html += '<button class="nav-btn" id="nav'+idx+'" onclick="scrollToQ('+idx+')">'+q.num+'</button>';
    });
    grid.innerHTML = html;
}

function selectOption(idx, key) {
    if (submitted) return;
    const q = QUESTIONS[idx];
    if (q.type === 'multiple') {
        if (!userAnswers[idx]) userAnswers[idx] = [];
        const pos = userAnswers[idx].indexOf(key);
        if (pos >= 0) userAnswers[idx].splice(pos, 1);
        else userAnswers[idx].push(key);
        userAnswers[idx].sort();
    } else {
        userAnswers[idx] = key;
    }
    updateOptionUI(idx);
    updateStats();
}

function updateOptionUI(idx) {
    const q = QUESTIONS[idx];
    const opts = document.querySelectorAll('.option[data-idx="'+idx+'"]');
    opts.forEach(opt => {
        opt.classList.remove('selected','correct','wrong');
        const key = opt.dataset.key;
        if (q.type === 'multiple') {
            if (userAnswers[idx] && userAnswers[idx].includes(key)) opt.classList.add('selected');
        } else {
            if (userAnswers[idx] === key) opt.classList.add('selected');
        }
    });
    const navBtn = document.getElementById('nav'+idx);
    if (navBtn) {
        navBtn.classList.toggle('answered', userAnswers[idx] !== undefined && 
            (q.type==='multiple' ? userAnswers[idx].length > 0 : true));
    }
}

function updateStats() {
    let answered = 0;
    QUESTIONS.forEach((q, idx) => {
        if (q.type === 'multiple') {
            if (userAnswers[idx] && userAnswers[idx].length > 0) answered++;
        } else {
            if (userAnswers[idx]) answered++;
        }
    });
    document.getElementById('answeredNum').textContent = answered;
}

function submitExam() {
    submitted = true;
    if (timerInterval) clearInterval(timerInterval);
    let totalScore = 0, correctCount = 0;
    
    QUESTIONS.forEach((q, idx) => {
        let ua = userAnswers[idx];
        let isCorrect = false;
        if (q.type === 'multiple') {
            const ans = (ua || []).sort().join('');
            isCorrect = ans === q.answer;
        } else if (q.type === 'judge') {
            const ansMap = {'正确':'A','错误':'B'};
            isCorrect = ua === ansMap[q.answer];
        } else {
            isCorrect = ua === q.answer;
        }
        
        if (isCorrect) {
            totalScore += SCORE_MAP[q.type];
            correctCount++;
        }
        
        // Show result on options
        const opts = document.querySelectorAll('.option[data-idx="'+idx+'"]');
        opts.forEach(opt => {
            opt.classList.remove('selected');
            const key = opt.dataset.key;
            if (q.type === 'judge') {
                const ansKey = q.answer === '正确' ? 'A' : 'B';
                if (key === ansKey) opt.classList.add('correct');
                else if (ua === key) opt.classList.add('wrong');
            } else if (q.type === 'multiple') {
                const correctKeys = q.answer.split('');
                if (correctKeys.includes(key)) opt.classList.add('correct');
                else if (ua && ua.includes(key)) opt.classList.add('wrong');
            } else {
                if (key === q.answer) opt.classList.add('correct');
                else if (ua === key) opt.classList.add('wrong');
            }
        });
        
        const navBtn = document.getElementById('nav'+idx);
        if (navBtn) {
            navBtn.classList.remove('answered');
            navBtn.classList.add(isCorrect ? 'correct' : 'wrong');
        }
        
        document.getElementById('ans'+idx).classList.add('show');
    });
    
    document.getElementById('correctNum').textContent = correctCount;
    
    const result = document.getElementById('result');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const scoreDetail = document.getElementById('scoreDetail');
    const passStatus = document.getElementById('passStatus');
    
    scoreDisplay.textContent = totalScore + '分';
    scoreDisplay.className = 'score ' + (totalScore >= 60 ? 'pass' : 'fail');
    scoreDetail.textContent = '答对 ' + correctCount + '/' + QUESTIONS.length + ' 题，得分 ' + totalScore + '/100';
    passStatus.textContent = totalScore >= 60 ? '✅ 恭喜通过！' : '❌ 未通过，请继续加油！';
    result.classList.add('show');
    result.scrollIntoView({behavior:'smooth'});
}

function showAllAnswers() {
    QUESTIONS.forEach((q, idx) => {
        document.getElementById('ans'+idx).classList.add('show');
        const opts = document.querySelectorAll('.option[data-idx="'+idx+'"]');
        opts.forEach(opt => {
            const key = opt.dataset.key;
            if (q.type === 'judge') {
                if (key === (q.answer === '正确' ? 'A' : 'B')) opt.classList.add('correct');
            } else if (q.type === 'multiple') {
                if (q.answer.includes(key)) opt.classList.add('correct');
            } else {
                if (key === q.answer) opt.classList.add('correct');
            }
        });
    });
}

function resetExam() {
    userAnswers = {};
    submitted = false;
    timerSeconds = 90 * 60;
    document.getElementById('result').classList.remove('show');
    document.getElementById('correctNum').textContent = '-';
    QUESTIONS.forEach((q, idx) => {
        document.getElementById('ans'+idx).classList.remove('show');
        const navBtn = document.getElementById('nav'+idx);
        if (navBtn) navBtn.className = 'nav-btn';
    });
    renderQuestions();
    updateStats();
    startTimer();
    window.scrollTo(0, 0);
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timerSeconds--;
        if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            submitExam();
            return;
        }
        const min = Math.floor(timerSeconds / 60);
        const sec = timerSeconds % 60;
        document.getElementById('timer').textContent = 
            String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
    }, 1000);
}

function scrollToQ(idx) {
    const el = document.getElementById('q'+idx);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

init();
</script>
