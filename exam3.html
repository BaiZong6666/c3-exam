const SM={single:1,multiple:2,judge:1};
let UA={}; // idx -> answer (string or array)
let confirmed={}; // idx -> bool (feedback shown)
let submitted=false;
let sec=90*60,ti=null;
let correctCnt=0,wrongCnt=0;

function init(){
  renderAll();
  setupEvents();
  startTimer();
}

function setupEvents(){
  document.getElementById('qContainer').addEventListener('click',function(e){
    const opt=e.target.closest('.opt');
    if(opt){
      const i=parseInt(opt.dataset.i);
      const k=opt.dataset.k;
      tapOpt(i,k);
    }
    const btn=e.target.closest('.confirm-btn');
    if(btn){
      const i=parseInt(btn.dataset.mi);
      confirmMulti(i);
    }
  });
}

function renderAll(){
  let h='',last='';
  const tn={single:'一、单选题（每题1分，共60分）',multiple:'二、多选题（每题2分，共10题）',judge:'三、判断题（每题1分，共20题）'};
  Q.forEach((q,i)=>{
    if(q.type!==last){h+='<div class="section-title">'+tn[q.type]+'</div>';last=q.type;}
    h+='<div class="q-card" id="qc'+i+'">';
    h+='<div class="q-head"><span class="qnum">'+q.num+'.</span>'+esc(q.question);
    if(q.type==='multiple')h+='<span class="q-type-tag">多选</span>';
    h+='</div>';
    const keys=q.type==='judge'?['A','B']:['A','B','C','D'];
    keys.forEach(k=>{
      const v=q.type==='judge'?(k==='A'?'正确':'错误'):(q.options[k]||'');
      if(!v&&q.type!=='judge')return;
      h+='<div class="opt" id="o'+i+'_'+k+'" data-i="'+i+'" data-k="'+k+'">';
      h+='<span class="letter">'+k+'</span>'+esc(v)+'</div>';
    });
    h+='<div class="feedback" id="fb'+i+'"></div>';
    if(q.type==='multiple')h+='<div class="confirm-row" id="cr'+i+'"><button class="confirm-btn" data-mi="'+i+'">确认答案</button></div>';
    h+='</div>';
  });
  document.getElementById('qContainer').innerHTML=h;
}

function tapOpt(i,k){
  if(submitted||confirmed[i])return;
  const q=Q[i];
  if(q.type==='multiple'){
    if(!UA[i])UA[i]=[];
    const p=UA[i].indexOf(k);
    if(p>=0)UA[i].splice(p,1);else UA[i].push(k);
    UA[i].sort();
  }else{
    UA[i]=k;
    showFeedback(i);
  }
  updateOptUI(i);
  updateStats();
}

function confirmMulti(i){
  if(!UA[i]||UA[i].length<2){
    alert('多选题至少选择2个选项');return;
  }
  showFeedback(i);
  document.getElementById('cr'+i).classList.remove('show');
}

function showFeedback(i){
  confirmed[i]=true;
  const q=Q[i];
  let ua=UA[i];
  let ok=false;
  let correctAns=q.answer;

  if(q.type==='multiple'){
    const a=(ua||[]).sort().join('');
    ok=a===q.answer;
  }else if(q.type==='judge'){
    const am={'正确':'A','错误':'B'};  // 正确:A 错误:B
    ok=ua===am[q.answer];
    correctAns=q.answer;
  }else{
    ok=ua===q.answer;
  }

  if(ok)correctCnt++;else wrongCnt++;

  // Update option styles
  const keys=q.type==='judge'?['A','B']:['A','B','C','D'];
  keys.forEach(k=>{
    const el=document.getElementById('o'+i+'_'+k);
    if(!el)return;
    el.classList.remove('sel');
    if(q.type==='judge'){
      const ansK=q.answer==='正确'?'A':'B';
      if(k===ansK)el.classList.add('ok');
      else if(ua===k)el.classList.add('err');
      else el.classList.add('dim');
    }else if(q.type==='multiple'){
      const cks=q.answer.split('');
      if(cks.includes(k))el.classList.add('ok');
      else if(ua&&ua.includes(k))el.classList.add('err');
      else el.classList.add('dim');
    }else{
      if(k===q.answer)el.classList.add('ok');
      else if(ua===k)el.classList.add('err');
      else el.classList.add('dim');
    }
  });

  // Show feedback text
  const fb=document.getElementById('fb'+i);
  if(ok){
    fb.className='feedback show fb-ok';
    fb.innerHTML='✅ 回答正确！';  // ✅ 回答正确！
  }else{
    fb.className='feedback show fb-err';
    if(q.type==='judge')fb.innerHTML='❌ 回答错误，正确答案：'+correctAns;  // ❌ 回答错误，正确答案：
    else fb.innerHTML='❌ 回答错误，正确答案：'+correctAns;
  }

  updateStats();
}

function updateOptUI(i){
  const q=Q[i];
  const keys=q.type==='judge'?['A','B']:['A','B','C','D'];
  keys.forEach(k=>{
    const el=document.getElementById('o'+i+'_'+k);
    if(!el)return;
    el.classList.remove('sel','ok','err','dim');
    if(q.type==='multiple'){
      if(UA[i]&&UA[i].includes(k))el.classList.add('sel');
    }else{
      if(UA[i]===k)el.classList.add('sel');
    }
  });
  // Show confirm button for multiple choice
  if(q.type==='multiple'&&UA[i]&&UA[i].length>=1&&!confirmed[i]){
    document.getElementById('cr'+i).classList.add('show');
  }
}

function updateStats(){
  let answered=0;
  Q.forEach((q,i)=>{
    if(confirmed[i])answered++;
  });
  document.getElementById('answeredN').textContent=answered;
  document.getElementById('correctN').textContent=correctCnt;
  document.getElementById('wrongN').textContent=wrongCnt;
  const pct=(answered/Q.length*100).toFixed(0);
  document.getElementById('progressFill').style.width=pct+'%';
}

function submitExam(){
  if(submitted)return;
  submitted=true;
  if(ti)clearInterval(ti);
  
  // Auto-confirm unanswered
  Q.forEach((q,i)=>{
    if(!confirmed[i]){
      if(q.type==='multiple'&&UA[i]&&UA[i].length>=2)showFeedback(i);
      else if(q.type!=='multiple'&&UA[i])showFeedback(i);
    }
  });
  
  // Calculate score
  let ts=0,cc=0;
  let sCorrect=0,mCorrect=0,jCorrect=0;
  Q.forEach((q,i)=>{
    let ua=UA[i],ok=false;
    if(q.type==='multiple'){ok=(ua||[]).sort().join('')===q.answer;if(ok){mCorrect++;ts+=2;}}
    else if(q.type==='judge'){ok=ua===(q.answer==='正确'?'A':'B');if(ok){jCorrect++;ts+=1;}}
    else{ok=ua===q.answer;if(ok){sCorrect++;ts+=1;}}
    if(ok)cc++;
  });
  
  const rc=document.getElementById('resultCard');
  const bs=document.getElementById('bigScore');
  bs.textContent=ts+'分';  // 分
  bs.className='big-score '+(ts>=60?'pass':'fail');
  document.getElementById('rDetail').textContent='答对 '+cc+'/'+Q.length+' 题';  // 答对 x/n 题
  document.getElementById('rBreakdown').textContent='单选'+sCorrect+'/60 多选'+mCorrect+'/10 判断'+jCorrect+'/20';  // 单选x/60 多选x/10 判断x/20
  const tag=document.getElementById('rTag');
  if(ts>=60){tag.className='pass-tag yes';tag.textContent='✅ 恭喜通过！';}  // ✅ 恭喜通过！
  else{tag.className='pass-tag no';tag.textContent='❌ 未通过，继续加油！';}  // ❌ 未通过，继续加油！
  rc.classList.add('show');
  rc.scrollIntoView({behavior:'smooth'});
  
  document.getElementById('submitBtn').disabled=true;
}

function resetExam(){
  UA={};confirmed={};submitted=false;
  correctCnt=0;wrongCnt=0;sec=90*60;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('submitBtn').disabled=false;
  renderAll();updateStats();startTimer();
  window.scrollTo(0,0);
}

function startTimer(){
  if(ti)clearInterval(ti);
  ti=setInterval(()=>{
    sec--;
    if(sec<=0){clearInterval(ti);submitExam();return;}
    const m=Math.floor(sec/60),s=sec%60;
    document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  },1000);
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

init();
</script>
