    <script>
        const examData = {"试卷1": [{"type": "single", "num": 1, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械在（\n安全生产考核第六批题库及参考答案\n重要提示：自2025 年10 月20 日起，广东省建筑施工企业安全生产\n管理人员安全生产考核启用第六批考核题库。\n一、单选题\n）\n应当经有相应资质的检验检测机构监督检验合格。\nA.验收前\nB.验收后\nC.调试前\nD.调试后", "options": {"A": "验收前", "B": "验收后", "C": "调试前", "D": "调试后"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 2, "question": "根据《建设工程安全生产管理条例》，施工单位的主要负责人、项\n目经理、专职安全生产管理人员应当经（\n）或其他有关部门考核\n合格后方可任职。\nA.安全生产管理机构\nB.建设行政主管部门\nC.监察机构\nD.劳动保障机构", "options": {"A": "安全生产管理机构", "B": "建设行政主管部门", "C": "监察机构", "D": "劳动保障机构"}, "answer": "B", "source": "bank"}, {"type": "single", "num": 3, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械经验收合\n\n=== 第2页 ===\n格后方可投入使用，未经验收或者验收不合格的（\n）。\nA.不得使用\nB.减少起重量使用\nC.应立即报废\nD.可以试用", "options": {"A": "不得使用", "B": "减少起重量使用", "C": "应立即报废", "D": "可以试用"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 4, "question": "根据《建设工程安全生产管理条例》，建设单位不得对勘察、设计、\n施工、工程监理等单位提出不符合建设工程安全生产法律、法规和强\n制性标准规定的要求，不得（\n）。\nA.变更合同约定的造价\nB.变更合同约定的内容\nC.变更设计图纸\nD.压缩合同约定的工期", "options": {"A": "变更合同约定的造价", "B": "变更合同约定的内容", "C": "变更设计图纸", "D": "压缩合同约定的工期"}, "answer": "D", "source": "bank"}, {"type": "single", "num": 5, "question": "属于特种作业人员的有（）A. 建筑电工 B. 起重信号工 C. 架子工 D. 普通抹灰\n工", "options": {"A": "", "B": "", "C": "", "D": ""}, "answer": "B", "source": "raw"}, {"type": "single", "num": 6, "question": "施工现场必须制订消防预案，建立健全消防防火责任制和管理制\n度，配备消防器材及（\n）消防人员。\nA.专职\nB.兼职\n\n=== 第243页 ===\nC.义务\nD.专业", "options": {"A": "专职", "B": "兼职 === 第243页 ===", "C": "义务", "D": "专业"}, "answer": "C", "source": "bank"}, {"type": "single", "num": 7, "question": "在编制工程概算时，（\n）应当确定建设工程安全作业环境及安\n全施工措施所需费用。\nA.建设单位\n\n=== 第96页 ===\nB.监理单位\nC.设计单位\nD.工程项目部", "options": {"A": "建设单位 === 第96页 ===", "B": "监理单位", "C": "设计单位", "D": "工程项目部"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 8, "question": "事故发生后，事故现场有关人员应当立即向本单位负责人报告；\n\n=== 第128页 ===\n本单位负责人接到报告后，应当于（\n）小时内向事故发生地县级\n以上人民政府安全生产监督管理部门和负有安全生产监督管理职责\n的有关部门报告。\nA.1\nB.3\nC.12\nD.24", "options": {"A": "1", "B": "3", "C": "12", "D": "24"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 9, "question": "根据《建设工程安全生产管理条例》规定，施工单位应当在施工\n现场建立（\n），确定消防安全责任人。\nA.消防安全责任制度\n\n=== 第6页 ===\nB.消防责任制度\nC.安全责任制度\nD.消防警示制度", "options": {"A": "消防安全责任制度 === 第6页 ===", "B": "消防责任制度", "C": "安全责任制度", "D": "消防警示制度"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 10, "question": "根据《建设工程安全生产管理条例》规定，施工单位采购、租赁\n的安全防护用具、机械设备、施工机具及配件，应当具有（\n），并\n在进入施工现场前进行查验。\nA.生产（制造）许可证、产品合格证\nB.产品编号和生产日期\nC.产品材料证明\nD.生产制造人员和检验人员", "options": {"A": "生产（制造）许可证、产品合格证", "B": "产品编号和生产日期", "C": "产品材料证明", "D": "生产制造人员和检验人员"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 11, "question": "建筑安全监督机构在检查施工现场时，发现某施工单位在没有竣\n工的建筑物内设置员工集体宿舍，下列表述正确的是施工单位（\n）。\nA.经工程所在地建设安全监督机构同意，可以继续使用\nB.经工程所在地建设行政主管部门同意，可以继续使用\nC.必须将宿舍迁出\nD.经工程所在地质量监督机构同意，可以继续使用", "options": {"A": "经工程所在地建设安全监督机构同意，可以继续使用", "B": "经工程所在地建设行政主管部门同意，可以继续使用", "C": "必须将宿舍迁出", "D": "经工程所在地质量监督机构同意，可以继续使用"}, "answer": "C", "source": "bank"}, {"type": "single", "num": 12, "question": "根据《建设工程安全生产管理条例》，总承包单位和分包单位对分\n包工程的安全生产承担（\n）责任。\nA.全部\nB.连带\nC.部分\nD.主要", "options": {"A": "全部", "B": "连带", "C": "部分", "D": "主要"}, "answer": "B", "source": "bank"}, {"type": "single", "num": 13, "question": "根据《建设工程安全生产管理条例》，意外伤害保险期限自建设工\n程开工之日起至（\n）止。\nA.保修期结束\nB.竣工验收合格\nC.建筑封顶\nD.施工作业人员退场", "options": {"A": "保修期结束", "B": "竣工验收合格", "C": "建筑封顶", "D": "施工作业人员退场"}, "answer": "B", "source": "bank"}, {"type": "single", "num": 14, "question": "项目负责人对本项目安全生产全面负责。（）", "options": {"A": "", "B": "", "C": "", "D": ""}, "answer": "B", "source": "raw"}, {"type": "single", "num": 15, "question": "违反建设工程安全生产管理条例的规定，（\n）未提供建设工程\n安全生产作业环境及安全施工措施所需费用的，责令限期改正；逾期\n\n=== 第119页 ===\n未改正的，责令该建设工程停止施工。\nA.建设单位\nB.施工单位\nC.发包单位\nD.承包单位", "options": {"A": "建设单位", "B": "施工单位", "C": "发包单位", "D": "承包单位"}, "answer": "A", "source": "bank"}, {"type": "single", "num": 16, "question": "根据《建设工程安全生产管理条例》，建设单位不得（\n）施工\n单位购买、租赁、使用不符合安全施工要求的安全防护用具、机械设\n备、施工机具及配件、             document.querySelectorAll('.answer-cell').forEach(cell => {
                const num = parseInt(cell.textContent);
                cell.classList.remove('answered', 'correct', 'wrong');
                
                if (submitted) {
                    const q = questions.find(q => q.num === num);
                    if (userAnswers[num] === q.answer) {
                        cell.classList.add('correct');
                    } else if (userAnswers[num]) {
                        cell.classList.add('wrong');
                    }
                } else if (userAnswers[num]) {
                    cell.classList.add('answered');
                }
            });
            
            // Update stats
            document.getElementById('answeredCount').textContent = Object.keys(userAnswers).length;
        }
        
        function submitExam() {
            if (submitted) return;
            submitted = true;
            
            const questions = examData['试卷' + currentExam];
            let correct = 0;
            
            questions.forEach(q => {
                if (userAnswers[q.num] === q.answer) {
                    correct++;
                }
            });
            
            const score = Math.round(correct / questions.length * 100);
            
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('score').textContent = score;
            document.getElementById('result').style.display = 'block';
            
            updateUI();
            clearInterval(timerInterval);
        }
        
        function resetExam() {
            userAnswers = {};
            submitted = false;
            timeLeft = 90 * 60;
            
            document.getElementById('result').style.display = 'none';
            document.getElementById('correctCount').textContent = '-';
            
            renderQuestions();
            startTimer();
        }
        
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    min.toString().padStart(2, '0') + ':' + sec.toString().padStart(2, '0');
                
                if (timeLeft <= 0) {
                    submitExam();
                }
            }, 1000);
        }
        
        // Initialize
        renderQuestions();
        startTimer();
    </script>
</body>
</html>
